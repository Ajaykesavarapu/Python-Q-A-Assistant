services:
  - type: web
    name: python-qa-assistant
    env: python
    rootDir: python-qa-assistant
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_ENV
        value: production
